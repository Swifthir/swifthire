<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title id="pageTitleHead">Sign In | Swifthire</title>
    <meta name="description" content="Secure access to your Swifthire professional dashboard.">
    
    <!-- PWA Manifest & Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0000CC">

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Swifthire">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================
           DESIGN SYSTEM - CSS VARIABLES
        ============================================ */
        :root {
            --primary-50:  #EFF6FF;
            --primary-100: #DBEAFE;
            --primary-500: #3B82F6;
            --primary-600: #2563EB;
            --primary-700: #1D4ED8;
            --accent-50:  #F5F3FF;
            --accent-100: #EDE9FE;
            --accent-500: #8B5CF6;
            --accent-600: #7C3AED;
            --success-500: #10B981;
            --success-100: #D1FAE5;
            --warning-500: #F59E0B;
            --warning-100: #FEF3C7;
            --danger-500:  #EF4444;
            --danger-100:  #FEE2E2;
            --gray-50:  #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-700: #374151;
            --gray-900: #111827;
            
            --gradient-primary: linear-gradient(135deg, #2563EB 0%, #8B5CF6 100%);
            --gradient-subtle:  linear-gradient(180deg, #FFFFFF 0%, #F9FAFB 100%);
            --gradient-mesh:
                radial-gradient(circle at 20% 50%, rgba(37,99,235,0.07) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139,92,246,0.07) 0%, transparent 50%);
            
            --font-main:  'Plus Jakarta Sans', sans-serif;
            --font-serif: 'Playfair Display', serif;
            
            --shadow-sm:    0 2px 8px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.04);
            --shadow-card:  0 10px 30px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
            --shadow-blue:  0 8px 25px rgba(37,99,235,0.25);
            
            --radius-md:   0.75rem;
            --radius-lg:   1rem;
            --radius-2xl:  1.5rem;
            --radius-full: 9999px;
            
            --transition:  all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-main);
            color: var(--gray-500);
            background-color: var(--white);
            background-image: var(--gradient-mesh), var(--gradient-subtle);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ---- HEADER ---- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 5%; position: fixed; top: 0; left: 0; right: 0;
            z-index: 1000; box-shadow: 0 1px 0 rgba(0,0,0,0.06), var(--shadow-sm);
        }
        
        .nav-logo {
            display: flex; align-items: center; gap: 12px; font-family: var(--font-serif);
            font-size: 1.5rem; font-weight: 800; color: var(--gray-900); text-decoration: none; transition: var(--transition);
        }
        .nav-logo:hover { opacity: 0.85; }
        
        .nav-logo-icon {
            width: 42px; height: 42px; background: transparent;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        .header-link {
            color: var(--gray-700); font-weight: 600; text-decoration: none; font-size: 0.95rem;
            padding: 10px 20px; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius-full); transition: var(--transition);
        }
        .header-link:hover { background: var(--primary-50); color: var(--primary-600); border-color: var(--primary-100); }

        /* ---- LOGIN SECTION ---- */
        .auth-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 120px 5% 60px;
            position: relative;
        }
        
        /* Background Grid Pattern */
        .auth-container::before {
            content: ''; position: absolute; inset: 0; pointer-events: none; z-index: -1;
            background-image: linear-gradient(rgba(37,99,235,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(37,99,235,0.03) 1px, transparent 1px);
            background-size: 60px 60px; mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
        }

        .auth-card {
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
            width: 100%; max-width: 460px; border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-card); border: 1px solid var(--gray-100);
            padding: 48px; position: relative; animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header { text-align: center; margin-bottom: 32px; }
        .auth-title { font-family: var(--font-serif); font-size: 2.2rem; color: var(--gray-900); margin-bottom: 8px; font-weight: 800; letter-spacing: -0.02em; }
        .auth-subtitle { color: var(--gray-500); font-size: 1rem; line-height: 1.6; }

        .form-group { margin-bottom: 24px; text-align: left; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--gray-700); font-size: 0.9rem; }
        
        .input-wrapper { position: relative; }
        .form-input {
            width: 100%; padding: 14px 18px; padding-right: 45px;
            border: 1px solid var(--gray-200); border-radius: var(--radius-lg);
            font-family: inherit; font-size: 0.95rem; transition: var(--transition);
            background: var(--gray-50); color: var(--gray-900); font-weight: 500;
        }
        .form-input::placeholder { color: var(--gray-400); font-weight: 400; }
        
        .form-input:focus {
            outline: none; border-color: var(--primary-500); background: var(--white);
            box-shadow: 0 0 0 4px var(--primary-50);
        }

        /* Eye Icon */
        .toggle-password {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            color: var(--gray-400); cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; justify-content: center;
            background: transparent; border: none; padding: 4px;
        }
        .toggle-password:hover { color: var(--primary-600); }

        .forgot-link { font-size: 0.85rem; color: var(--primary-600); text-decoration: none; font-weight: 600; transition: var(--transition); float: right; margin-top: 8px; }
        .forgot-link:hover { color: var(--primary-700); text-decoration: underline; }

        .btn-primary {
            width: 100%; padding: 16px; background: var(--gradient-primary); color: var(--white);
            border: none; border-radius: var(--radius-full); font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: var(--transition); margin-top: 8px; display: flex; justify-content: center; align-items: center; gap: 10px; font-family: inherit;
            box-shadow: var(--shadow-blue); position: relative; z-index: 1; overflow: hidden;
        }
        .btn-primary::before {
            content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, #1D4ED8 0%, #7C3AED 100%);
            border-radius: inherit; opacity: 0; transition: opacity 0.3s ease; z-index: -1;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(37,99,235,0.35); }
        .btn-primary:hover::before { opacity: 1; }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }

        .divider { margin: 32px 0; text-align: center; position: relative; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--gray-200); }
        .divider span { position: relative; background: var(--white); padding: 0 16px; color: var(--gray-400); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

        .footer-links { text-align: center; font-size: 0.95rem; color: var(--gray-500); font-weight: 500; }
        .footer-links a { color: var(--primary-600); font-weight: 700; text-decoration: none; transition: var(--transition); }
        .footer-links a:hover { color: var(--primary-700); text-decoration: underline; }

        /* Error / Success Message */
        #messageBox {
            padding: 14px 18px; border-radius: var(--radius-lg); font-size: 0.9rem; margin-bottom: 24px;
            display: none; text-align: left; font-weight: 600; border: 1px solid transparent;
            align-items: center; gap: 10px; line-height: 1.4;
        }
        
        .msg-error { color: var(--danger-500); background: var(--danger-100); border-color: rgba(239, 68, 68, 0.2) !important; }
        .msg-success { color: var(--success-500); background: var(--success-100); border-color: rgba(16, 185, 129, 0.2) !important; }

        /* Loading Spinner */
        .spinner {
            width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff; border-radius: 50%;
            animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .auth-card { padding: 40px 24px; border-radius: var(--radius-xl); border-left: none; border-right: none; }
            .auth-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <a href="index.html" class="nav-logo" aria-label="Swifthire Home">
            <div class="nav-logo-icon" aria-hidden="true">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
                    <circle cx="50" cy="50" r="46" fill="none" stroke="#000000" stroke-width="4"/>
                    <path d="M 12 55 C 12 75, 25 88, 42 92 C 30 84, 22 68, 22 55 Z" fill="#0000CC"/>
                    <path d="M 88 55 C 88 75, 75 88, 58 92 C 70 84, 78 68, 78 55 Z" fill="#0000CC"/>
                    <circle cx="62" cy="24" r="10" fill="#000000"/>
                    <path d="M 72 12 C 40 0, 15 30, 42 48 C 62 60, 72 75, 52 88" fill="none" stroke="#000000" stroke-width="12" stroke-linecap="round"/>
                </svg>
            </div>
            <span id="headerAppName">Swifthire</span>
        </a>
        <a href="auth-signup.html" class="header-link">Get Started</a>
    </header>

    <!-- LOGIN FORM -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to access your professional dashboard.</p>
            </div>

            <div id="messageBox">
                <svg id="msgIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span id="msgText">Message goes here</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-input" placeholder="name@example.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                            <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <a href="auth-forgot-password.html" class="forgot-link">Forgot Password?</a>
                    <div style="clear: both;"></div>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <div class="spinner" id="spinner"></div>
                    <span id="btnText">Sign In</span>
                </button>
            </form>

            <div class="divider"><span>OR</span></div>

            <div class="footer-links">
                Don't have an account? <a href="auth-signup.html">Create new account</a>
            </div>
        </div>
    </div>

    <!-- UI Scripts -->
    <script>
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pwd = document.getElementById('password');
            const svg = this.querySelector('svg');
            if (pwd.type === 'password') { 
                pwd.type = 'text'; 
                svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else { 
                pwd.type = 'password'; 
                svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        });
        window.moduleLoaded = false;
    </script>

    <!-- FIREBASE INLINED -->
    <script type="module">
        window.moduleLoaded = true;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Your EXACT Firebase config inlined
        const firebaseConfig = {
          apiKey: "AIzaSyD8AOxIyZlb_Zb21AMTW_Pp8yvJRwyXhOI",
          authDomain: "skilllink69-122aa.firebaseapp.com",
          projectId: "skilllink69-122aa",
          storageBucket: "skilllink69-122aa.firebasestorage.app",
          messagingSenderId: "673456146518",
          appId: "1:673456146518:web:1d09ea145a83e25ad213f7",
          measurementId: "G-H69LL8HKYQ"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Config Elements
        const pageTitleHead = document.getElementById('pageTitleHead');
        const headerAppName = document.getElementById('headerAppName');

        // --- Configuration Listener (Branding) ---
        function loadAppConfig() {
            if (!db) return;
            try {
                const brandRef = doc(db, "settings", "branding");
                onSnapshot(brandRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        const appName = data.appName || 'Swifthire';
                        
                        if(pageTitleHead) pageTitleHead.textContent = `Sign In | ${appName}`;
                        if(headerAppName) headerAppName.textContent = appName;

                        if(data.primaryColor) document.documentElement.style.setProperty('--primary-600', data.primaryColor);
                        if(data.fontFamily) document.documentElement.style.setProperty('--font-main', `${data.fontFamily}, sans-serif`);
                    }
                });
            } catch (error) { 
                console.warn("Failed to set up listeners for configuration.", error); 
            }
        }

        // Execute Config Loader Real-time
        loadAppConfig(); 

        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const messageBox = document.getElementById('messageBox');
        const msgText = document.getElementById('msgText');
        const msgIcon = document.getElementById('msgIcon');

        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reset UI
            messageBox.style.display = 'none';
            messageBox.className = '';
            submitBtn.disabled = true;
            spinner.style.display = 'block';
            btnText.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                // A. Execute Firebase Login
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // B. Check Email Verification First
                if (!user.emailVerified) {
                    // DO NOT SIGN OUT HERE. We need the session to pass to auth-verify.html
                    window.location.replace(`auth-verify.html?email=${encodeURIComponent(email)}`);
                    return;
                }

                // C. Fetch Role from Firestore to determine Routing
                const userDocRef = doc(db, "users", user.uid);
                const userDocSnap = await getDoc(userDocRef);

                if (userDocSnap.exists()) {
                    const userData = userDocSnap.data();
                    
                    // Prevent locked accounts from logging in
                    if (userData.status === 'locked') {
                        await signOut(auth);
                        throw { code: 'auth/account-locked', message: 'Your account has been locked. Please contact support.' };
                    }
                    
                    // D. Route based strictly on user role
                    if (userData.role === 'admin' || userData.role === 'superadmin' || userData.role === 'employer') {
                        window.location.replace("admin-dashboard.html");
                    } else {
                        // Default user/seeker routing
                        window.location.replace("seeker-dashboard.html");
                    }
                } else {
                    // Fallback routing if Firestore document is missing
                    window.location.replace("seeker-dashboard.html");
                }

            } catch (error) {
                console.error("Login error:", error);
                
                messageBox.style.display = 'flex'; 
                messageBox.className = 'msg-error'; 
                
                let msg = "Failed to sign in. Please check your credentials.";
                msgIcon.innerHTML = '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>';

                const errorMap = {
                    'auth/user-not-found':       'No account found with this email.',
                    'auth/wrong-password':        'Incorrect password. Please try again.',
                    'auth/invalid-credential':    'Invalid email or password.',
                    'auth/invalid-email':         'Please enter a valid email address.',
                    'auth/too-many-requests':     'Too many failed attempts. Please wait and try again.',
                    'auth/network-request-failed':'Network error. Check your internet connection.',
                    'auth/user-disabled':         'This account has been disabled. Contact support.',
                };
                if (errorMap[error.code]) msg = errorMap[error.code];
                if(error.code === 'auth/account-locked') {
                    msg = error.message;
                    msgIcon.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>';
                }
                
                msgText.textContent = msg;
                
                // Reset Button
                submitBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.style.display = 'block';
            }
        });
    </script>
</body>
</html>
